    <text x="314" y="438" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.12em">SYSTEM</text>
    <text x="314" y="470" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Aegis</text>
  </g>

  <g>
    <rect x="476" y="404" width="192" height="82" rx="22" fill="url(#panel)" stroke="url(#panelStroke)"/>
    <text x="506" y="438" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.12em">ARCHITECTURE</text>
    <text x="506" y="470" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Low Coupling</text>
  </g>

  <g opacity="0.16">
    <text x="822" y="252" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="210" font-weight="800">MI</text>
    <text x="782" y="430" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="186" font-weight="800">CH</text>
  </g>

  <path d="M770 118L1132 118" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M770 150L1090 150" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <path d="M770 182L1166 182" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>


<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">川意 Developer Poster Banner</title>
  <desc id="desc">Dark developer poster style banner for the MiChongs GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="1214" y2="516" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#040B14"/>
      <stop offset="0.52" stop-color="#081321"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 128) rotate(90) scale(210 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 376) rotate(90) scale(220 260)">
      <stop stop-color="#22C55E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0A1B2D"/>
      <stop offset="1" stop-color="#101B31"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="1264" height="544" rx="34" fill="url(#bg)"/>
  <rect x="8" y="8" width="1264" height="544" rx="34" fill="url(#cyanGlow)"/>
  <rect x="8" y="8" width="1264" height="544" rx="34" fill="url(#greenGlow)"/>

  <g opacity="0.08">
    <path d="M72 86H1208" stroke="white"/>
    <path d="M72 146H1208" stroke="white"/>
    <path d="M72 206H1208" stroke="white"/>
    <path d="M72 266H1208" stroke="white"/>
    <path d="M72 326H1208" stroke="white"/>
    <path d="M72 386H1208" stroke="white"/>
    <path d="M72 446H1208" stroke="white"/>
    <path d="M146 50V510" stroke="white"/>
    <path d="M246 50V510" stroke="white"/>
    <path d="M346 50V510" stroke="white"/>
    <path d="M446 50V510" stroke="white"/>
    <path d="M546 50V510" stroke="white"/>
    <path d="M646 50V510" stroke="white"/>
    <path d="M746 50V510" stroke="white"/>
    <path d="M846 50V510" stroke="white"/>
    <path d="M946 50V510" stroke="white"/>
    <path d="M1046 50V510" stroke="white"/>
    <path d="M1146 50V510" stroke="white"/>
  </g>

  <text x="92" y="78" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.32em">DEVELOPER POSTER / 2026</text>
  <text x="92" y="172" fill="#F8FAFC" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="108" font-weight="800">川意</text>
  <text x="96" y="214" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="0.14em">MICHONGS</text>
  <text x="92" y="264" fill="#CBD5E1" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="28" font-weight="600">长江工程职业技术学院</text>
  <text x="92" y="318" fill="#A5B4C3" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">Go Backend Builder / Kotlin Explorer / Platform-oriented Engineering</text>
  <text x="92" y="360" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="400">Building high-performance systems with clean boundaries, stable architecture, and maintainable service design.</text>

  <g>
    <rect x="92" y="404" width="172" height="82" rx="22" fill="url(#panel)" stroke="url(#panelStroke)"/>
    <text x="122" y="438" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.12em">FOCUS</text>
    <text x="122" y="470" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Go / PgSQL</text>
  </g>

  <g>

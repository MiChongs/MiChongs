<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">川意 GitHub Profile Banner</title>
  <desc id="desc">Centered engineering profile banner for the MiChongs GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="48" x2="1184" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111D"/>
      <stop offset="0.5" stop-color="#0B1627"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="haloA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 96) rotate(90) scale(180 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 322) rotate(90) scale(180 260)">
      <stop stop-color="#22C55E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B2236"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="1260" height="400" rx="30" fill="url(#bg)"/>
  <rect x="10" y="10" width="1260" height="400" rx="30" fill="url(#haloA)"/>
  <rect x="10" y="10" width="1260" height="400" rx="30" fill="url(#haloB)"/>

  <g opacity="0.08">
    <path d="M70 90H1210" stroke="white"/>
    <path d="M70 150H1210" stroke="white"/>
    <path d="M70 210H1210" stroke="white"/>
    <path d="M70 270H1210" stroke="white"/>
    <path d="M70 330H1210" stroke="white"/>
    <path d="M180 50V370" stroke="white"/>
    <path d="M320 50V370" stroke="white"/>
    <path d="M460 50V370" stroke="white"/>
    <path d="M600 50V370" stroke="white"/>
    <path d="M740 50V370" stroke="white"/>
    <path d="M880 50V370" stroke="white"/>
    <path d="M1020 50V370" stroke="white"/>
    <path d="M1160 50V370" stroke="white"/>
  </g>

  <circle cx="640" cy="210" r="132" fill="#0A1626" fill-opacity="0.6" stroke="#38BDF8" stroke-opacity="0.16"/>
  <circle cx="640" cy="210" r="156" stroke="#22C55E" stroke-opacity="0.08"/>

  <text x="640" y="108" text-anchor="middle" fill="#7DD3FC" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.3em">GITHUB PROFILE</text>
  <text x="640" y="196" text-anchor="middle" fill="#F8FAFC" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="76" font-weight="800">川意</text>
  <text x="640" y="236" text-anchor="middle" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">MiChongs</text>
  <text x="640" y="272" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="22" font-weight="500">长江工程职业技术学院</text>
  <text x="640" y="308" text-anchor="middle" fill="#A5B4C3" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400">Go Backend · Kotlin Explorer · Multi-tenant Systems</text>

  <g>
    <rect x="92" y="118" width="188" height="92" rx="24" fill="url(#panel)" stroke="url(#panelStroke)"/>
    <text x="126" y="154" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">CURRENT FOCUS</text>
    <text x="126" y="186" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Go + PgSQL</text>
  </g>

  <g>
    <rect x="92" y="224" width="188" height="92" rx="24" fill="url(#panel)" stroke="url(#panelStroke)"/>
    <text x="126" y="260" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">ARCHITECTURE</text>
    <text x="126" y="292" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Low Coupling</text>
  </g>

  <g>

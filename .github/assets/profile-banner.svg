  <circle cx="1104" cy="120" r="54" stroke="#38BDF8" stroke-opacity="0.28" stroke-width="2"/>
  <circle cx="1104" cy="120" r="76" stroke="#38BDF8" stroke-opacity="0.12" stroke-width="2"/>
  <circle cx="976" cy="354" r="78" stroke="#22C55E" stroke-opacity="0.14" stroke-width="2"/>
  <circle cx="1142" cy="294" r="22" fill="#38BDF8" fill-opacity="0.18"/>
  <circle cx="866" cy="216" r="12" fill="#22C55E" fill-opacity="0.24"/>

  <g>
    <rect x="878" y="438" width="102" height="30" rx="15" fill="#0A2236" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="929" y="458" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Go</text>
    <rect x="994" y="438" width="102" height="30" rx="15" fill="#0A2236" stroke="#38BDF8" stroke-opacity="0.3"/>
    <text x="1045" y="458" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Kotlin</text>
    <rect x="1110" y="438" width="116" height="30" rx="15" fill="#0A2236" stroke="#22C55E" stroke-opacity="0.3"/>
    <text x="1168" y="458" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">PostgreSQL</text>

    <text x="1034" y="154" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">FLAGSHIP</text>
    <text x="1034" y="186" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Aegis</text>
  </g>

  <g>
    <rect x="1000" y="224" width="188" height="92" rx="24" fill="url(#panel)" stroke="url(#panelStroke)"/>
    <text x="1034" y="260" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">DIRECTION</text>
    <text x="1034" y="292" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Platform</text>
  </g>

  <g>
    <rect x="458" y="344" width="112" height="30" rx="15" fill="#0A2236" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="514" y="364" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Go</text>
    <rect x="584" y="344" width="112" height="30" rx="15" fill="#0A2236" stroke="#38BDF8" stroke-opacity="0.3"/>
    <text x="640" y="364" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Kotlin</text>
    <rect x="710" y="344" width="112" height="30" rx="15" fill="#0A2236" stroke="#22C55E" stroke-opacity="0.3"/>
    <text x="766" y="364" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">PostgreSQL</text>
  </g>
